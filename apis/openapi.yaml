openapi: 3.0.3
info:
  title: DummyJSON API Automation
  version: 1.0.0
  description: Test suite for DummyJSON — login token correlation demo
  contact:
    email: abdelrahmangamal.h@gmail.com
  license:
    name: MIT

servers:
  - url: https://dummyjson.com

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      operationId: loginUser
      summary: Login and get access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful — returns JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid credentials
        '401':
          description: Unauthorized

  /auth/me:
    get:
      operationId: getCurrentUser
      summary: Get current authenticated user
      responses:
        '200':
          description: Returns current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized — invalid or missing token

  /products:
    get:
      operationId: listProducts
      summary: List all products
      responses:
        '200':
          description: Returns list of products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductsListResponse'
        '401':
          description: Unauthorized

  /products/add:
    post:
      operationId: createProduct
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created
        '400':
          description: Bad request
        '401':
          description: Unauthorized

  /products/{id}:
    get:
      operationId: getProduct
      summary: Get a single product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Returns product
        '401':
          description: Unauthorized
        '404':
          description: Product not found
    put:
      operationId: updateProduct
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '200':
          description: Product updated
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Product not found
    delete:
      operationId: deleteProduct
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product deleted
        '401':
          description: Unauthorized
        '404':
          description: Product not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        username:
          type: string
        email:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string

    Product:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        price:
          type: number
        category:
          type: string

    ProductsListResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        total:
          type: integer

    CreateProductRequest:
      type: object
      properties:
        title:
          type: string
        price:
          type: number
        description:
          type: string
        category:
          type: string
