name: DummyJSON API Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - 'feature/*'
      - 'fix/*'
  pull_request:
    branches:
      - main
      - develop

permissions:
  checks: write
  contents: read

jobs:
  validate:
    name: Validate OpenAPI Spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Redocly CLI
        run: npm install -g @redocly/cli

      - name: Lint OpenAPI spec
        run: redocly lint apis/openapi.yaml --format=stylish

  test:
    name: Run API Tests
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install apidog-cli
        run: npm install -g apidog-cli

      - name: Run API tests
        run: |
         apidog run "tests/DummyJSON API Tests.apidog-cli.json" \
            -r html,cli,junit \
            --out-dir apidog-reports/

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-reports
          path: apidog-reports/

      - name: Publish JUnit test results
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'apidog-reports/*.xml'
          fail_on_failure: false
          include_passed: true
